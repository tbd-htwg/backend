server:
  port: 8080

# Comma-separated. Override in production via CORS_ALLOWED_ORIGINS if needed.
tripplanning:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://tbd-htwg.de,https://www.tbd-htwg.de,https://iaas.tbd-htwg.de,https://paas.tbd-htwg.de}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

  elasticsearch:
    restclient:
      sniffer:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        search:
          backend:
            # Both Lucene and Elasticsearch backends are on the classpath; pick one explicitly.
            type: elasticsearch
            protocol: http
            hosts: ${ELASTICSEARCH_HOSTS:localhost:9200}
            discovery:
              enabled: false
          schema_management:
            strategy: create-or-validate

  jackson:
    serialization:
      write-dates-as-timestamps: false

  data:
    rest:
      base-path: /api/v2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
