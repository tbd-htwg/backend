server:
  port: 8080

# Comma-separated. Override in production via CORS_ALLOWED_ORIGINS if needed.
tripplanning:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://tbd-htwg.de,https://www.tbd-htwg.de,https://iaas.tbd-htwg.de,https://paas.tbd-htwg.de}
  auth:
    firebase-project-id: ${TRIPPLANNING_AUTH_FIREBASE_PROJECT_ID:project-9118634e-c9f1-4f29-804}
    jwt-secret: ${TRIPPLANNING_AUTH_JWT_SECRET:}
    jwt-expiration-seconds: ${TRIPPLANNING_AUTH_JWT_EXPIRATION_SECONDS:43200}
  # Hibernate Search logical index name for TripEntity. Use distinct values per environment when
  # several backends share one Elasticsearch cluster (e.g. tripentity-develop, tripentity-staging).
  search:
    elasticsearch-index-name: ${TRIPPLANNING_SEARCH_ELASTICSEARCH_INDEX_NAME:tripentity}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driverClassName: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

  elasticsearch:
    restclient:
      sniffer:
        enabled: false

  # Flyway owns the SQL schema: migrations in db/migration are applied once,
  # tracked in the flyway_schema_history table, and coordinated via a DB lock
  # so multiple Cloud Run instances cold-starting in parallel are safe. Hibernate
  # is then only allowed to validate that its entity mapping matches the schema.
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        search:
          mapping:
            configurer: bean:tripSearchMappingConfigurer
          backend:
            # Both Lucene and Elasticsearch backends are on the classpath; pick one explicitly.
            type: elasticsearch
            protocol: ${ELASTICSEARCH_PROTOCOL:http}
            hosts: ${ELASTICSEARCH_HOSTS:localhost:9200}
            username: ${ELASTICSEARCH_USERNAME:}
            password: ${ELASTICSEARCH_PASSWORD:}
            path_prefix: ${ELASTICSEARCH_PATH_PREFIX:}
            discovery:
              enabled: false
          schema_management:
            strategy: create-or-validate

  cloud:
    gcp:
      impersonate-service-account: ${SPRING_CLOUD_GCP_IMPERSONATE_SERVICE_ACCOUNT:}
      sql:
        enabled: false
      storage:
        bucket-name: "project-9118634e-c9f1-4f29-804-images-bucket"

  jackson:
    serialization:
      write-dates-as-timestamps: false

  data:
    rest:
      base-path: /api/v2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
