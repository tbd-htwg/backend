# Local development against H2 (file store under ./temp/db/) and Hibernate Search Lucene (indexes under ./temp/search/).
# Activate: SPRING_PROFILES_ACTIVE=local  or  --spring.profiles.active=local

spring:
  config:
    activate:
      on-profile: local

  # Local H2 is recreated on every run by Hibernate (ddl-auto: create-drop below),
  # so Flyway is redundant and its Postgres-flavored V1 migration would not run
  # cleanly against H2. Keep the migrations source of truth in db/migration for
  # production and let Hibernate regenerate the schema from entities here.
  flyway:
    enabled: false

  datasource:
    # MODE=PostgreSQL improves compatibility with PostgreSQL in other environments
    url: jdbc:h2:file:./temp/db/tripplanning-dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  elasticsearch:
    restclient:
      sniffer:
        enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      # Recreate H2 schema each run; easy clean slate for local dev.
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        search:
          backend:
            type: lucene
            directory:
              root: ./temp/search
            analysis:
              configurer: "class:com.tripplanning.search.LuceneEnglishAnalysisConfigurer"
          schema_management:
            strategy: create-or-validate

  cloud:
    gcp:
      impersonate-service-account: "tripplanning-dev-img-store@project-9118634e-c9f1-4f29-804.iam.gserviceaccount.com"
      storage:
        bucket-name: "project-9118634e-c9f1-4f29-804-images-bucket"
      sql:
        enabled: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

tripplanning:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  auth:
    # Dev-only default; override with TRIPPLANNING_AUTH_JWT_SECRET in shared environments.
    jwt-secret: ${TRIPPLANNING_AUTH_JWT_SECRET:local-dev-only-change-me-32bytes-min!!}
    google-client-id: ${TRIPPLANNING_AUTH_GOOGLE_CLIENT_ID:}
