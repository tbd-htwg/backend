# Local development against H2 (file store under ./db/).
# Activate: SPRING_PROFILES_ACTIVE=local  or  --spring.profiles.active=local

spring:
  config:
    activate:
      on-profile: local

  datasource:
    # MODE=PostgreSQL improves compatibility with PostgreSQL in other environments
    url: jdbc:h2:file:./db/tripplanning-dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
