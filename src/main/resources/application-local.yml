# Local development against H2 (file store under ./temp/db/) and Hibernate Search Lucene (indexes under ./temp/search/).
# Activate: SPRING_PROFILES_ACTIVE=local  or  --spring.profiles.active=local

spring:
  config:
    activate:
      on-profile: local

  datasource:
    # MODE=PostgreSQL improves compatibility with PostgreSQL in other environments
    url: jdbc:h2:file:./temp/db/tripplanning-dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  elasticsearch:
    restclient:
      sniffer:
        enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      # Recreate H2 schema each run; easy clean slate for local dev.
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        search:
          backend:
            type: lucene
            directory:
              root: ./temp/search
            analysis:
              configurer: "class:com.tripplanning.search.LuceneEnglishAnalysisConfigurer"
          schema_management:
            strategy: create-or-validate

tripplanning:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
