name: Deploy Backend to GCP Cloud Run

"on":
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: Select the environment to deploy to
        required: true
        default: 'develop'
  push:
    branches: ["main", "staging", "develop"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'develop')) }}
    env:
      REGION: ${{ vars.GCP_REGION }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      DEPLOYER_SA_EMAIL: ${{ vars.GCP_BACKEND_DEPLOYER_SA_EMAIL }}
      ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
      SERVICE_NAME: ${{ vars.GCP_BACKEND_SERVICE }}
      RUN_SA_EMAIL: ${{ vars.GCP_RUN_SA_EMAIL }}
      CLOUDSQL_CONNECTION_NAME: ${{ vars.GCP_CLOUDSQL_CONNECTION_NAME }}
      DB_NAME: ${{ vars.GCP_DB_NAME }}
      DB_USER: ${{ vars.GCP_DB_USER }}
      DB_PASSWORD_SECRET: ${{ vars.GCP_DB_PASSWORD_SECRET }}
      CORS_ALLOWED_ORIGINS: ${{ vars.GCP_CORS_ALLOWED_ORIGINS }}
      GCP_IMPERSONATE_SERVICE_ACCOUNT: ${{ vars.GCP_IMPERSONATE_SERVICE_ACCOUNT }}
      # Firestore database id (named DB in GCP). Sets GCP_FIRESTORE_DATABASE_ID on Cloud Run.
      GCP_FIRESTORE_DATABASE_ID: ${{ vars.GCP_FIRESTORE_DATABASE_ID }}
      # Remote Elasticsearch (Secret Manager secret *id*, not the password string — see deploy step).
      GCP_ELASTICSEARCH_PROTOCOL: ${{ vars.GCP_ELASTICSEARCH_PROTOCOL }}
      GCP_ELASTICSEARCH_HOSTS: ${{ vars.GCP_ELASTICSEARCH_HOSTS }}
      GCP_ELASTICSEARCH_USERNAME: ${{ vars.GCP_ELASTICSEARCH_USERNAME }}
      GCP_ELASTICSEARCH_PATH_PREFIX: ${{ vars.GCP_ELASTICSEARCH_PATH_PREFIX }}
      GCP_ELASTICSEARCH_PASSWORD_SECRET: ${{ vars.GCP_ELASTICSEARCH_PASSWORD_SECRET }}
      # Optional: distinct Hibernate Search index per environment when sharing one ES cluster (e.g. tripentity-develop).
      GCP_TRIP_SEARCH_INDEX_NAME: ${{ vars.GCP_TRIP_SEARCH_INDEX_NAME }}
      # JWT signing secret (Secrets); Firebase ID token verification uses PROJECT_ID (= vars.GCP_PROJECT_ID).
      TRIPPLANNING_AUTH_JWT_SECRET: ${{ secrets.TRIPPLANNING_AUTH_JWT_SECRET }}
      # Cloud Run capacity (override via repo/environment vars CLOUD_RUN_CPU, CLOUD_RUN_MEMORY, CLOUD_RUN_CONCURRENCY).
      CLOUD_RUN_CPU: ${{ vars.CLOUD_RUN_CPU || '2' }}
      CLOUD_RUN_MEMORY: ${{ vars.CLOUD_RUN_MEMORY || '2Gi' }}
      CLOUD_RUN_CONCURRENCY: ${{ vars.CLOUD_RUN_CONCURRENCY || '80' }}

    # ------------------------------------------------------------
    # Build backend image, publish to Artifact Registry, deploy to
    # Cloud Run with Cloud SQL + Secret Manager wiring.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Build backend image tagged by commit SHA and push to Artifact Registry.
      - name: Build and push backend image
        env:
          IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/tripplanning-backend:${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      # Deploy Cloud Run: DB + optional Elasticsearch. Search backend comes from application.yml
      # (elasticsearch); set GCP_ELASTICSEARCH_* GitHub vars per environment. Password is the
      # Secret Manager secret *id* (e.g. my-project-elastic-password), mounted as ELASTICSEARCH_PASSWORD.
      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          test -n "${PROJECT_ID:-}" || {
            echo "Missing required variable: GCP_PROJECT_ID"
            exit 1
          }
          test -n "${TRIPPLANNING_AUTH_JWT_SECRET:-}" || {
            echo "Missing required secret: TRIPPLANNING_AUTH_JWT_SECRET"
            exit 1
          }
          PROTO="${GCP_ELASTICSEARCH_PROTOCOL:-https}"
          HOSTS="${GCP_ELASTICSEARCH_HOSTS:?Set GCP_ELASTICSEARCH_HOSTS in the GitHub Environment variables (e.g. es.example.com:443)}"
          # gcloud --set-env-vars default pair delimiter is ','; value-safe multi-pair form is ^D^...D...D
          # (^@^ breaks when any value contains '@', e.g. service account emails). Use '|' — ensure no value contains '|'.
          EV="^|^SPRING_DATASOURCE_URL=jdbc:postgresql:///${DB_NAME}?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=${CLOUDSQL_CONNECTION_NAME}|SPRING_DATASOURCE_USERNAME=${DB_USER}|SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver|CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}|ELASTICSEARCH_PROTOCOL=${PROTO}|ELASTICSEARCH_HOSTS=${HOSTS}"
          if [ -n "${GCP_ELASTICSEARCH_USERNAME:-}" ]; then
            EV="${EV}|ELASTICSEARCH_USERNAME=${GCP_ELASTICSEARCH_USERNAME}"
          fi
          if [ -n "${GCP_ELASTICSEARCH_PATH_PREFIX:-}" ]; then
            EV="${EV}|ELASTICSEARCH_PATH_PREFIX=${GCP_ELASTICSEARCH_PATH_PREFIX}"
          fi
          if [ -n "${GCP_TRIP_SEARCH_INDEX_NAME:-}" ]; then
            EV="${EV}|TRIPPLANNING_SEARCH_ELASTICSEARCH_INDEX_NAME=${GCP_TRIP_SEARCH_INDEX_NAME}"
          fi
          EV="${EV}|TRIPPLANNING_AUTH_FIREBASE_PROJECT_ID=${PROJECT_ID}"
          EV="${EV}|TRIPPLANNING_AUTH_JWT_SECRET=${TRIPPLANNING_AUTH_JWT_SECRET}"
          if [ -n "${GCP_IMPERSONATE_SERVICE_ACCOUNT:-}" ]; then
            EV="${EV}|GCP_IMPERSONATE_SERVICE_ACCOUNT=${GCP_IMPERSONATE_SERVICE_ACCOUNT}"
          fi
          if [ -n "${GCP_FIRESTORE_DATABASE_ID:-}" ]; then
            EV="${EV}|GCP_FIRESTORE_DATABASE_ID=${GCP_FIRESTORE_DATABASE_ID}"
          fi
          SECRETS="SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD_SECRET}:latest"
          if [ -n "${GCP_ELASTICSEARCH_PASSWORD_SECRET}" ]; then
            SECRETS="${SECRETS},ELASTICSEARCH_PASSWORD=${GCP_ELASTICSEARCH_PASSWORD_SECRET}:latest"
          fi
          # --cpu-boost: extra CPU during startup (helps JVM / Spring Boot bind PORT).
          # --startup-probe: TCP on 8080; generous delay/threshold so slow cold starts pass (default probe is tight).
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu="${CLOUD_RUN_CPU}" \
            --memory="${CLOUD_RUN_MEMORY}" \
            --concurrency="${CLOUD_RUN_CONCURRENCY}" \
            --cpu-boost \
            --startup-probe=initialDelaySeconds=30,timeoutSeconds=5,periodSeconds=5,failureThreshold=60,tcpSocket.port=8080 \
            --service-account="${RUN_SA_EMAIL}" \
            --set-cloudsql-instances="${CLOUDSQL_CONNECTION_NAME}" \
            --set-env-vars="${EV}" \
            --set-secrets="${SECRETS}"
