name: Deploy Backend to GCP Cloud Run

"on":
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: Select the environment to deploy to
        required: true
        default: 'develop'
  push:
    branches: ["main", "staging", "develop"]

############################################################################
# WORKFLOW PERMISSIONS AND GLOBAL VARIABLES
############################################################################

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || (github.ref == 'refs/heads/staging' && 'staging' || 'develop')) }}

    env:
      REGION: ${{ vars.GCP_REGION }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  SERVICE_NAME: ${{ vars.GCP_BACKEND_SERVICE }}
  RUN_SA_EMAIL: ${{ vars.GCP_RUN_SA_EMAIL }}
  CLOUDSQL_CONNECTION_NAME: ${{ vars.GCP_CLOUDSQL_CONNECTION_NAME }}
  DB_NAME: ${{ vars.GCP_DB_NAME }}
  DB_USER: ${{ vars.GCP_DB_USER }}
  DB_PASSWORD_SECRET: ${{ vars.GCP_DB_PASSWORD_SECRET }}
  CORS_ALLOWED_ORIGINS: ${{ vars.GCP_CORS_ALLOWED_ORIGINS }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    # ------------------------------------------------------------
    # Build backend image, publish to Artifact Registry, deploy to
    # Cloud Run with Cloud SQL + Secret Manager wiring.
    # ------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      # Build backend image tagged by commit SHA and push to Artifact Registry.
      - name: Build and push backend image
        env:
          IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/tripplanning-backend:${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      # Deploy Cloud Run service and wire DB config + DB password secret.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --service-account="${RUN_SA_EMAIL}" \
            --set-cloudsql-instances="${CLOUDSQL_CONNECTION_NAME}" \
            --set-env-vars="^@^SPRING_DATASOURCE_URL=jdbc:postgresql:///${DB_NAME}?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=${CLOUDSQL_CONNECTION_NAME}@SPRING_DATASOURCE_USERNAME=${DB_USER}@SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver@CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}@SPRING_JPA_PROPERTIES_HIBERNATE_SEARCH_BACKEND_TYPE=lucene@SPRING_JPA_PROPERTIES_HIBERNATE_SEARCH_BACKEND_DIRECTORY_ROOT=/tmp/tripplanning-search@SPRING_JPA_PROPERTIES_HIBERNATE_SEARCH_BACKEND_ANALYSIS_CONFIGURER=class:com.tripplanning.search.LuceneEnglishAnalysisConfigurer" \
            --set-secrets="SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD_SECRET}:latest"
